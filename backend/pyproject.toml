[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
# pyflakes (F), pycodestyle (E/W), isort (I), pyupgrade (UP)
select = ["E", "F", "W", "I", "UP"]
# E501 line-too-long is handled by the formatter; a few long Turkish strings are fine.
ignore = ["E501"]
